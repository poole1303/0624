<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>BGM</title>
</head>

<body style="margin:0">

<audio
  id="bgm"
  autoplay
  loop
>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("bgm");

audio.volume = 0.5;

/* 避免重複播放 */

if(!localStorage.getItem("bgmStarted")){

    audio.play();

    localStorage.setItem("bgmStarted","true");

}else{

    audio.play();

}

</script>

</body>
</html>
